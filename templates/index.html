<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .game-container { width: 100%; max-width: 500px; margin: 0 auto; }
        canvas { background: #222; width: 100%; height: 110px; border-radius: 12px; margin-top: 5px; border: 1px solid #444; transition: background 0.3s; }
        
        .admin-panel { background: #2a2a2a; padding: 12px; border-radius: 18px; margin-top: 10px; border: 2px solid #ffcc00; text-align: left; font-size: 0.8rem; }
        .row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; gap: 8px; }
        
        .input-small { width: 50px; background: #333; color: #ffcc00; border: 1px solid #555; padding: 4px; border-radius: 6px; text-align: center; }
        .hex-input { width: 75px; background: #333; color: #fff; border: 1px solid #555; padding: 4px; border-radius: 6px; text-align: center; font-family: monospace; font-size: 0.7rem; }
        .color-picker { width: 30px; height: 30px; border: none; padding: 0; background: none; cursor: pointer; border-radius: 5px; }
        
        input[type=range] { flex-grow: 1; }
        .btn { width: 100%; padding: 18px; font-size: 1.2rem; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #master-btn { background: #ffcc00; color: black; box-shadow: 0 4px #997a00; }
        #player-btn { background: #007bff; color: white; height: 32vh; max-height: 280px; font-size: 2.5rem; box-shadow: 0 6px #004a99; }
        
        .hidden { display: none !important; }
        #status { font-size: 1.3rem; height: 45px; margin: 5px 0; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .dir-indicator { font-size: 1.5rem; color: #ffcc00; }
    </style>
</head>
<body>

    <div id="role-setup" style="margin-top: 25vh;">
        <button class="btn" style="background:#ffcc00" onclick="setRole('master')">МАСТЕР</button>
        <button class="btn" style="background:#007bff; color:white; margin-top:20px;" onclick="setRole('player')">ИГРОК</button>
    </div>

    <div id="game-ui" class="game-container hidden">
        <div id="status">
            <span id="live-dir" class="dir-indicator"></span>
            <span id="status-text">ОЖИДАНИЕ...</span>
        </div>
        <canvas id="gameCanvas"></canvas>

        <div id="master-view" class="hidden">
            <div class="admin-panel">
                <div class="row">
                    <span id="dir-icon" style="font-size:1.5rem">➡</span>
                    <input type="range" id="speed-range" min="-60" max="60" value="7" oninput="sync(false)">
                    <input type="number" id="speed-num" class="input-small" value="7" oninput="sync(true)">
                </div>
                <div class="row">
                    <span>Мин: <input type="number" id="min-limit" class="input-small" value="-60" oninput="sync(true)"></span>
                    <span>Макс: <input type="number" id="max-limit" class="input-small" value="60" oninput="sync(true)"></span>
                    <span>Зона %: <input type="number" id="target-w" class="input-small" value="18" oninput="sync(true)"></span>
                </div>
                <div class="row">
                    <span>Фон:</span>
                    <input type="text" id="hex-bg" class="hex-input" oninput="colorSync('text', 'bg')">
                    <input type="color" id="pick-bg" class="color-picker" oninput="colorSync('pick', 'bg')">
                </div>
                <div class="row">
                    <span>Зона:</span>
                    <input type="text" id="hex-target" class="hex-input" oninput="colorSync('text', 'target')">
                    <input type="color" id="pick-target" class="color-picker" oninput="colorSync('pick', 'target')">
                </div>
                <div class="row">
                    <span>Линия:</span>
                    <input type="text" id="hex-bar" class="hex-input" oninput="colorSync('text', 'bar')">
                    <input type="color" id="pick-bar" class="color-picker" oninput="colorSync('pick', 'bar')">
                </div>
                <div class="row">
                    <span>Отскок: <input type="checkbox" id="bounce-mode" onchange="sync(true)"></span>
                    <span>Край=Конец: <input type="checkbox" id="edge-check" checked onchange="sync(true)"></span>
                </div>
            </div>
            <button id="master-btn" class="btn" onclick="socket.emit('master_start')">ПУСК</button>
        </div>

        <div id="player-view" class="hidden">
            <button id="player-btn" class="btn">ЖМИ!</button>
        </div>
    </div>

    <script>
        const socket = io();
        const tg = window.Telegram.WebApp;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let role = '', isPlaying = false, barX = 0, targetX = 100, direction = 1;
        let config = { 
            speed: 7, bounce_mode: false, color_bar: "#ffffff", color_bg: "#222222", 
            color_target: "#00ff78", target_width: 18, fail_on_edge: true, min_limit: -60, max_limit: 60
        };

        tg.expand();

        function setRole(r) {
            role = r;
            document.getElementById('role-setup').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            if (role === 'master') document.getElementById('master-view').classList.remove('hidden');
            else document.getElementById('player-view').classList.remove('hidden');
            resize();
        }

        function resize() { canvas.width = canvas.offsetWidth; canvas.height = 110; }

        function colorSync(source, type) {
            const hex = document.getElementById(`hex-${type}`);
            const pick = document.getElementById(`pick-${type}`);
            if (source === 'text') {
                if (/^#[0-9A-F]{6}$/i.test(hex.value)) pick.value = hex.value;
            } else {
                hex.value = pick.value.toUpperCase();
            }
            sync(true);
        }

        function sync(fromInputs) {
            if (role !== 'master') return;
            const num = document.getElementById('speed-num'), range = document.getElementById('speed-range');
            const minL = parseInt(document.getElementById('min-limit').value);
            const maxL = parseInt(document.getElementById('max-limit').value);
            range.min = minL; range.max = maxL;

            if (fromInputs) { config.speed = parseInt(num.value); range.value = config.speed; }
            else { config.speed = parseInt(range.value); num.value = config.speed; }

            // Локальное обновление стрелки для мастера
            document.getElementById('dir-icon').innerText = config.speed >= 0 ? "➡" : "⬅";
            
            config.min_limit = minL; config.max_limit = maxL;
            config.bounce_mode = document.getElementById('bounce-mode').checked;
            config.fail_on_edge = document.getElementById('edge-check').checked;
            config.color_bar = document.getElementById('hex-bar').value;
            config.color_bg = document.getElementById('hex-bg').value;
            config.color_target = document.getElementById('hex-target').value;
            config.target_width = parseInt(document.getElementById('target-w').value) || 15;

            socket.emit('update_settings', config);
        }

        socket.on('settings_changed', (data) => {
            const oldSpeed = config.speed;
            config = data;
            canvas.style.backgroundColor = data.color_bg;
            
            // Прямой эфир: если скорость сменила знак и мы не в режиме отскока - меняем направление сразу
            if (isPlaying && !config.bounce_mode) {
                direction = config.speed >= 0 ? 1 : -1;
            }

            if (role === 'master') {
                document.getElementById('dir-icon').innerText = data.speed >= 0 ? "➡" : "⬅";
                ['bar', 'target', 'bg'].forEach(t => {
                    document.getElementById(`hex-${t}`).value = data[`color_${t}`].toUpperCase();
                    document.getElementById(`pick-${t}`).value = data[`color_${t}`];
                });
                document.getElementById('speed-num').value = data.speed;
                document.getElementById('speed-range').value = data.speed;
                document.getElementById('bounce-mode').checked = data.bounce_mode;
                document.getElementById('edge-check').checked = data.fail_on_edge;
                document.getElementById('target-w').value = data.target_width;
            }
            document.getElementById('live-dir').innerText = data.speed >= 0 ? "➡" : "⬅";
        });

        socket.on('start_level', (data) => {
            config = data;
            barX = config.speed >= 0 ? 0 : canvas.width;
            direction = config.speed >= 0 ? 1 : -1;
            isPlaying = true;
            document.getElementById('status-text').innerText = "ИГРАЕМ!";
            document.getElementById('status-text').style.color = "white";
            const tw = canvas.width * (config.target_width / 100);
            targetX = Math.random() * (canvas.width - tw);
        });

        function handlePress() {
            if (!isPlaying) return;
            isPlaying = false;
            const tw = canvas.width * (config.target_width / 100);
            const hit = barX >= targetX && barX <= (targetX + tw);
            socket.emit('player_press', { success: hit });
        }

        const pBtn = document.getElementById('player-btn');
        pBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handlePress(); });
        pBtn.addEventListener('mousedown', handlePress);

        socket.on('show_result', (data) => {
            isPlaying = false;
            document.getElementById('status-text').innerText = data.success ? "ПОПАЛ! ✅" : "ПРОМАХ! ❌";
            document.getElementById('status-text').style.color = data.success ? "#00ff78" : "#ff3c3c";
            tg.HapticFeedback.notificationOccurred(data.success ? 'success' : 'error');
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const tw = canvas.width * (config.target_width / 100);
            ctx.fillStyle = config.color_target;
            ctx.globalAlpha = 0.7;
            ctx.fillRect(targetX, 0, tw, canvas.height);
            ctx.globalAlpha = 1.0;

            if (isPlaying) {
                // Используем абсолютное значение скорости, так как direction управляется логикой отскока или знаком скорости
                barX += (Math.abs(config.speed) * direction) * (canvas.width / 600);

                if (config.bounce_mode) {
                    if (barX + 8 >= canvas.width) { barX = canvas.width - 8; direction = -1; tg.HapticFeedback.impactOccurred('light'); }
                    else if (barX <= 0) { barX = 0; direction = 1; tg.HapticFeedback.impactOccurred('light'); }
                } else {
                    if (barX > canvas.width || barX < -8) {
                        if (config.fail_on_edge) {
                            isPlaying = false;
                            if (role === 'player') socket.emit('player_press', { success: false });
                        } else {
                            barX = barX > canvas.width ? -8 : canvas.width;
                        }
                    }
                }
            }
            
            ctx.fillStyle = config.color_bar;
            ctx.fillRect(barX, 0, 8, canvas.height);
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
