<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .game-container { width: 100%; max-width: 500px; margin: 0 auto; }
        canvas { background: #222; width: 100%; height: 110px; border-radius: 12px; margin-top: 5px; border: 1px solid #444; }
        .admin-panel { background: #2a2a2a; padding: 12px; border-radius: 18px; margin-top: 10px; border: 2px solid #ffcc00; text-align: left; font-size: 0.8rem; }
        .row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; gap: 5px; }
        .input-small { width: 50px; background: #333; color: #ffcc00; border: 1px solid #555; padding: 4px; border-radius: 6px; text-align: center; }
        .hex-input { width: 75px; background: #333; color: #fff; border: 1px solid #555; padding: 4px; border-radius: 6px; text-align: center; font-family: monospace; text-transform: uppercase; }
        .color-picker { width: 30px; height: 30px; border: none; padding: 0; background: none; cursor: pointer; }
        input[type=range] { flex-grow: 1; }
        .btn { width: 100%; padding: 18px; font-size: 1.2rem; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #master-btn { background: #ffcc00; color: black; }
        #player-btn { background: #007bff; color: white; height: 30vh; max-height: 250px; font-size: 2rem; }
        .hidden { display: none !important; }
        #status { font-size: 1.3rem; height: 35px; margin: 5px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div id="role-setup" style="margin-top: 25vh;">
        <button class="btn" style="background:#ffcc00" onclick="setRole('master')">МАСТЕР</button>
        <button class="btn" style="background:#007bff; color:white; margin-top:20px;" onclick="setRole('player')">ИГРОК</button>
    </div>

    <div id="game-ui" class="game-container hidden">
        <div id="status">ОЖИДАНИЕ...</div>
        <canvas id="gameCanvas"></canvas>

        <div id="master-view" class="hidden">
            <div class="admin-panel">
                <div class="row">
                    <span>Скор: <input type="number" id="speed-num" class="input-small" value="7" oninput="sync(true)"></span>
                    <input type="range" id="speed-range" min="3" max="60" value="7" oninput="sync(false)">
                </div>
                <div class="row">
                    <span>Мин Скор: <input type="number" id="min-limit" class="input-small" value="3" oninput="sync(true)"></span>
                    <span>Макс Скор: <input type="number" id="max-limit" class="input-small" value="60" oninput="sync(true)"></span>
                </div>
                <div class="row">
                    <span>Полоса: <input type="text" id="hex-bar" class="hex-input" oninput="syncColors('text', 'bar')"></span>
                    <span>Зона: <input type="text" id="hex-target" class="hex-input" oninput="syncColors('text', 'target')"></span>
                    <span>Фон: <input type="text" id="hex-bg" class="hex-input" oninput="syncColors('text', 'bg')"></span>
                </div>
                <div class="row">
                    <span>Отскок: <input type="checkbox" id="bounce-mode" onchange="sync(true)"></span>
                    <span>Край=Fail: <input type="checkbox" id="edge-check" checked onchange="sync(true)"></span>
                    <span>Зона %: <input type="number" id="target-w" class="input-small" value="18" oninput="sync(true)"></span>
                </div>
            </div>
            <button id="master-btn" class="btn" onclick="socket.emit('master_start')">ПУСК</button>
        </div>

        <div id="player-view" class="hidden">
            <button id="player-btn" class="btn">ЖМИ!</button>
        </div>
    </div>

    <script>
        const socket = io();
        const tg = window.Telegram.WebApp;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let role = '', isPlaying = false, barX = 0, targetX = 100, direction = 1;
        let config = { 
            speed: 7, bounce_mode: false, color_bar: "#ffffff", color_bg: "#222222", 
            color_target: "#00ff78", target_width: 18, fail_on_edge: true, min_limit: 3, max_limit: 60
        };

        tg.expand();

        function setRole(r) {
            role = r;
            document.getElementById('role-setup').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            if (role === 'master') document.getElementById('master-view').classList.remove('hidden');
            else document.getElementById('player-view').classList.remove('hidden');
            resize();
        }

        function resize() { canvas.width = canvas.offsetWidth; canvas.height = 110; }

        function syncColors(source, type) {
            const hexInp = document.getElementById(`hex-${type}`);
            let val = hexInp.value;
            if (!val.startsWith('#')) val = '#' + val;
            if (/^#[0-9A-F]{6}$/i.test(val)) sync(true);
        }

        function sync(fromInputs) {
            if (role !== 'master') return;
            const minL = parseInt(document.getElementById('min-limit').value) || 1;
            const maxL = parseInt(document.getElementById('max-limit').value) || 100;
            const num = document.getElementById('speed-num');
            const range = document.getElementById('speed-range');

            // Обновляем границы ползунка
            range.min = minL;
            range.max = maxL;

            if (fromInputs) {
                config.speed = parseInt(num.value);
                range.value = config.speed;
            } else {
                config.speed = parseInt(range.value);
                num.value = config.speed;
            }

            config.min_limit = minL;
            config.max_limit = maxL;
            config.bounce_mode = document.getElementById('bounce-mode').checked;
            config.fail_on_edge = document.getElementById('edge-check').checked;
            config.color_bar = document.getElementById('hex-bar').value;
            config.color_bg = document.getElementById('hex-bg').value;
            config.color_target = document.getElementById('hex-target').value;
            config.target_width = parseInt(document.getElementById('target-w').value) || 15;

            socket.emit('update_settings', config);
        }

        socket.on('settings_changed', (data) => {
            config = data;
            canvas.style.backgroundColor = data.color_bg;
            if (role === 'master') {
                document.getElementById('hex-bar').value = data.color_bar.toUpperCase();
                document.getElementById('hex-target').value = data.color_target.toUpperCase();
                document.getElementById('hex-bg').value = data.color_bg.toUpperCase();
                document.getElementById('speed-num').value = data.speed;
                document.getElementById('speed-range').value = data.speed;
                document.getElementById('min-limit').value = data.min_limit;
                document.getElementById('max-limit').value = data.max_limit;
                document.getElementById('bounce-mode').checked = data.bounce_mode;
                document.getElementById('edge-check').checked = data.fail_on_edge;
                document.getElementById('target-w').value = data.target_width;
            }
        });

        socket.on('start_level', (data) => {
            config = data;
            barX = 0; direction = 1; isPlaying = true;
            document.getElementById('status').innerText = "ИГРАЕМ!";
            const tw = canvas.width * (config.target_width / 100);
            targetX = Math.random() * (canvas.width - tw);
        });

        function fail() {
            isPlaying = false;
            if (role === 'player') socket.emit('player_press', { success: false });
        }

        function handlePress() {
            if (!isPlaying) return;
            isPlaying = false;
            const tw = canvas.width * (config.target_width / 100);
            const hit = barX >= targetX && barX <= (targetX + tw);
            socket.emit('player_press', { success: hit });
        }

        const pBtn = document.getElementById('player-btn');
        pBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handlePress(); });
        pBtn.addEventListener('mousedown', handlePress);

        socket.on('show_result', (data) => {
            isPlaying = false;
            document.getElementById('status').innerText = data.success ? "ПОПАЛ! ✅" : "ПРОМАХ! ❌";
            document.getElementById('status').style.color = data.success ? "#00ff78" : "#ff3c3c";
            tg.HapticFeedback.notificationOccurred(data.success ? 'success' : 'error');
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const tw = canvas.width * (config.target_width / 100);
            
            ctx.fillStyle = config.color_target;
            ctx.globalAlpha = 0.7;
            ctx.fillRect(targetX, 0, tw, canvas.height);
            ctx.globalAlpha = 1.0;

            if (isPlaying) {
                // Двигаем полоску
                barX += (config.speed * direction) * (canvas.width / 600);

                if (config.bounce_mode) {
                    // РЕЖИМ ОТСКОКА
                    if (barX + 8 >= canvas.width) {
                        barX = canvas.width - 8;
                        direction = -1;
                        tg.HapticFeedback.impactOccurred('light');
                    } else if (barX <= 0) {
                        barX = 0;
                        direction = 1;
                        tg.HapticFeedback.impactOccurred('light');
                    }
                } else {
                    // РЕЖИМ КРУГА / ПРОВАЛА
                    // Проверка правого края
                    if (barX > canvas.width) {
                        if (config.fail_on_edge) fail();
                        else barX = -8;
                    }
                    // Проверка левого края (на случай отрицательной скорости)
                    if (barX < -8) {
                        if (config.fail_on_edge) fail();
                        else barX = canvas.width;
                    }
                }
            }
            
            ctx.fillStyle = config.color_bar;
            ctx.fillRect(barX, 0, 8, canvas.height);
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
